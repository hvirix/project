sonar.projectKey=hvirix_project
sonar.organization=hvirix

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=Electronic Journal
sonar.projectVersion=1.0

# Source and test paths
sonar.sources=src
sonar.tests=tests

# Encoding of the source code
sonar.sourceEncoding=UTF-8

# Test coverage report paths (LCOV for JS)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# JUnit XML test results (for SonarQube's "Tests" section)
sonar.testExecutionReportPaths=coverage/junit.xml
